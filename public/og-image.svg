<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030712"/>
      <stop offset="50%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#030712"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="20%" r="35%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <!-- Grid -->
  <g opacity="0.06" stroke="#6366F1" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="80" y1="0" x2="80" y2="630"/><line x1="160" y1="0" x2="160" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="320" y1="0" x2="320" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/><line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="560" y1="0" x2="560" y2="630"/><line x1="640" y1="0" x2="640" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="880" y1="0" x2="880" y2="630"/><line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1040" y1="0" x2="1040" y2="630"/><line x1="1120" y1="0" x2="1120" y2="630"/>
  </g>
  <!-- Logo -->
  <rect x="80" y="200" width="72" height="72" rx="16" fill="url(#brand)"/>
  <text x="116" y="248" text-anchor="middle" fill="white" font-family="Inter,system-ui,sans-serif" font-size="28" font-weight="900">OL</text>
  <!-- Title -->
  <text x="180" y="240" fill="white" font-family="Inter,system-ui,sans-serif" font-size="52" font-weight="800">Orchestrix Labs</text>
  <text x="80" y="330" fill="url(#brand)" font-family="Inter,system-ui,sans-serif" font-size="36" font-weight="700">AI Development Agency</text>
  <text x="80" y="400" fill="#94a3b8" font-family="Inter,system-ui,sans-serif" font-size="24">Voice AI · Automation · Full-Stack · Machine Learning</text>
  <!-- Stats bar -->
  <rect x="80" y="460" width="1040" height="80" rx="16" fill="white" fill-opacity="0.04" stroke="white" stroke-opacity="0.08"/>
  <text x="200" y="510" text-anchor="middle" fill="white" font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="700">200+ Projects</text>
  <text x="440" y="510" text-anchor="middle" fill="white" font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="700">100% JSS</text>
  <text x="680" y="510" text-anchor="middle" fill="white" font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="700">Top Rated</text>
  <text x="920" y="510" text-anchor="middle" fill="white" font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="700">6+ Years</text>
  <text x="80" y="590" fill="#64748b" font-family="Inter,system-ui,sans-serif" font-size="18">orchestrixlabs.com</text>
